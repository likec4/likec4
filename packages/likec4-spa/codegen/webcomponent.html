<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #likec4-react-root {
      width: 100%;
      height: 100%;
      position: relative;
      /* min-height: 100%; */
      padding: clamp(0.5rem, 5vh, 4rem) clamp(0.5rem, 5vw, 5rem);
      /* min-height: 100vh; */
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="likec4-react-root">
  </div>
  <script type="module">
    import './webcomponent.tsx';
    const el = document.createElement('likec4-view')
    const viewId = (window.location.hash || '#index').slice(1)
    el.setAttribute('view-id', viewId)
    el.setAttribute('dynamic-variant', 'sequence')
    document.getElementById('likec4-react-root').appendChild(el)
  </script>
</body>

</html>
