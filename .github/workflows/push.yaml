name: push

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    tags-ignore:
      - '**'
    branches-ignore:
      - 'main'
      - 'changeset-release/*'
      - 'releases/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

# Caller must allow actions: write so reusable checks jobs can upload/download artifacts (GitHub caps token to caller permissions).
permissions:
  contents: read
  actions: write

jobs:
  checks:
    # If on pull request, run only if coming from forked repos
    if: |
      !contains(github.event.head_commit.message, 'ci skip') && (
        github.event_name == 'push' || github.event.pull_request.head.repo.fork
      )
    uses: ./.github/workflows/checks.yaml
    secrets: inherit
